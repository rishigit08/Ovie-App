<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ovie — Uploading Documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet">
<style>
/* ── Ovie DS Tokens ─────────────────────────────────────────────────────── */
:root {
  --teal-50:  #DBEEF2; --teal-100: #BEEAF3; --teal-300: #35BAD6;
  --teal-400: #0C8CA6; --teal-500: #097084; --teal-600: #075362;
  --warm-50:  #FAF8F4; --warm-100: #F0EBE0; --warm-200: #E2D9C8;
  --warm-300: #C9C3B6; --warm-400: #A8A296; --warm-500: #7D7971;
  --emerald-400: #1A8C4E; --emerald-50: #E5F7ED;
  --ink-200:  #7A9094; --ink-300: #516C71; --ink-400: #35494D;
  --ink-500:  #1C2B2E; --ink-600: #111D1F;
  --white:    #FFFFFF;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--warm-100);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 24px 20px 24px;
  gap: 16px;
}

.page-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.09em;
  text-transform: uppercase; color: var(--warm-400);
}

/* ── Phone frame ─────────────────────────────────────────────────────────── */
.phone-frame {
  width: 360px; height: 800px;
  background: var(--warm-50);
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 32px 80px -12px rgba(28,43,46,0.28), 0 4px 20px rgba(28,43,46,0.1);
  flex-shrink: 0;
  display: flex; flex-direction: column;
}

/* ── Status bar ──────────────────────────────────────────────────────────── */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px 8px;
  font-size: 14px; font-weight: 500; color: var(--ink-500);
  flex-shrink: 0;
}
.status-bar-icons { display: flex; align-items: center; gap: 6px; }

/* ── Top bar ─────────────────────────────────────────────────────────────── */
.top-bar {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 6px 24px 12px;
  position: relative;
  flex-shrink: 0;
}
.back-btn {
  width: 24px; height: 24px;
  border: none; background: none; cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-400); flex-shrink: 0;
}
.top-bar-center {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding-right: 24px; /* balance with back btn width */
}
.top-bar-title {
  font-family: 'Source Serif 4', serif;
  font-size: 18px; font-weight: 600; color: var(--ink-500);
  line-height: 24px;
}
.top-bar-sub {
  font-size: 13px; font-weight: 500; color: var(--ink-300);
  line-height: 18px;
  transition: opacity 0.4s ease;
}

/* ── Doc list ────────────────────────────────────────────────────────────── */
.doc-list {
  display: flex; flex-direction: column; gap: 12px;
  padding: 16px 24px 0;
}

.doc-card {
  background: var(--white);
  border-radius: 20px;
  padding: 16px 12px;
  display: flex; flex-direction: column; gap: 16px;
  box-shadow: 0 4px 30px rgba(0,0,0,0.05);
}

.doc-card-row {
  display: flex; align-items: center; justify-content: space-between;
}

.doc-card-left {
  display: flex; align-items: center; gap: 12px;
  flex: 1; min-width: 0;
}

.doc-icon {
  width: 37px; height: 34px; flex-shrink: 0;
  background: var(--teal-50);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-400);
}

.doc-info { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
.doc-name  { font-size: 15px; font-weight: 500; color: var(--ink-500); line-height: 22px; }
.doc-meta  { display: flex; gap: 8px; font-size: 12px; font-weight: 400; color: var(--ink-300); line-height: 18px; letter-spacing: -0.24px; }

/* cancel / check icons */
.doc-action { flex-shrink: 0; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
.doc-action-cancel { color: var(--ink-300); }
.doc-action-done   { color: var(--emerald-400); }

/* progress section */
.doc-progress { display: flex; flex-direction: column; gap: 0; align-items: flex-start; }
.progress-track {
  width: 190px; height: 5px; border-radius: 100px;
  background: var(--teal-50); position: relative; overflow: hidden;
}
.progress-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: var(--teal-400); border-radius: 100px;
}

/* State transitions */
.doc-progress { transition: opacity 0.4s ease, max-height 0.4s ease; max-height: 20px; overflow: hidden; }
.doc-card.done .doc-progress { opacity: 0; max-height: 0; }
.doc-action-cancel { display: flex; }
.doc-action-done   { display: none; }
.doc-card.done .doc-action-cancel { display: none; }
.doc-card.done .doc-action-done   { display: flex; }

/* ── Cancel All button ───────────────────────────────────────────────────── */
.cancel-all-btn {
  display: flex; align-items: center; justify-content: center;
  height: 48px; border-radius: 8px; flex-shrink: 0;
  border: 0.5px solid var(--teal-400); background: none; cursor: pointer;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 15px; font-weight: 600; color: var(--teal-400);
  transition: background 0.14s;
}
.cancel-all-btn:hover { background: var(--teal-50); }
</style>
</head>
<body>

<p class="page-label">Upload Docs — Detail View</p>

<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:30</span>
    <div class="status-bar-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 9.5a1 1 0 1 0 0 2 1 1 0 0 0 0-2z" fill="currentColor"/>
        <path d="M4.5 7.2A4.97 4.97 0 0 1 8 6c1.38 0 2.63.56 3.54 1.46" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M1.5 4.2A8 8 0 0 1 8 2c2.57 0 4.86 1.21 6.35 3.1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <svg width="14" height="12" viewBox="0 0 14 12" fill="currentColor">
        <rect x="0" y="8" width="3" height="4" rx="1" opacity="0.4"/>
        <rect x="4" y="5" width="3" height="7" rx="1" opacity="0.6"/>
        <rect x="8" y="2" width="3" height="10" rx="1"/>
      </svg>
      <svg width="20" height="12" viewBox="0 0 20 12" fill="none">
        <rect x="0.5" y="0.5" width="16" height="11" rx="2.5" stroke="currentColor" stroke-opacity="0.5"/>
        <rect x="2" y="2" width="11" height="8" rx="1.5" fill="currentColor"/>
        <path d="M17.5 4v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <button class="back-btn" aria-label="Back" onclick="window.location.href='ovie-upload-docs-uploading.html'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <div class="top-bar-center">
      <span class="top-bar-title">Uploading Documents</span>
      <span class="top-bar-sub" id="topBarSub">Uploading 3 docs</span>
    </div>
  </div>

  <!-- Document List -->
  <div class="doc-list">

    <!-- Doc 1 — Declaration doc.pdf -->
    <div class="doc-card" id="doc1">
      <div class="doc-card-row">
        <div class="doc-card-left">
          <div class="doc-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 2h8l4 4v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/><path d="M11 2v4h4"/>
            </svg>
          </div>
          <div class="doc-info">
            <span class="doc-name">Declaration doc.pdf</span>
            <div class="doc-meta"><span>226 KB</span><span>PDF</span></div>
          </div>
        </div>
        <div class="doc-action doc-action-cancel" aria-label="Cancel upload">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="10" cy="10" r="8"/><path d="M7 7l6 6M13 7l-6 6"/>
          </svg>
        </div>
        <div class="doc-action doc-action-done" aria-label="Uploaded">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="8"/><path d="M6.5 10.5l2.5 2.5 5-5"/>
          </svg>
        </div>
      </div>
      <div class="doc-progress">
        <div class="progress-track">
          <div class="progress-fill" style="width:0%" id="fill1"></div>
        </div>
      </div>
    </div>

    <!-- Doc 2 — Car Insurance.pdf -->
    <div class="doc-card" id="doc2">
      <div class="doc-card-row">
        <div class="doc-card-left">
          <div class="doc-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 2h8l4 4v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/><path d="M11 2v4h4"/>
            </svg>
          </div>
          <div class="doc-info">
            <span class="doc-name">Car Insurance.pdf</span>
            <div class="doc-meta"><span>350 KB</span><span>PDF</span></div>
          </div>
        </div>
        <div class="doc-action doc-action-cancel" aria-label="Cancel upload">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="10" cy="10" r="8"/><path d="M7 7l6 6M13 7l-6 6"/>
          </svg>
        </div>
        <div class="doc-action doc-action-done" aria-label="Uploaded">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="8"/><path d="M6.5 10.5l2.5 2.5 5-5"/>
          </svg>
        </div>
      </div>
      <div class="doc-progress">
        <div class="progress-track">
          <div class="progress-fill" style="width:0%" id="fill2"></div>
        </div>
      </div>
    </div>

    <!-- Doc 3 — Policy Form.docx -->
    <div class="doc-card" id="doc3">
      <div class="doc-card-row">
        <div class="doc-card-left">
          <div class="doc-icon">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 2h8l4 4v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"/><path d="M11 2v4h4"/>
            </svg>
          </div>
          <div class="doc-info">
            <span class="doc-name">Policy Form.docx</span>
            <div class="doc-meta"><span>120 KB</span><span>DOCX</span></div>
          </div>
        </div>
        <div class="doc-action doc-action-cancel" aria-label="Cancel upload">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="10" cy="10" r="8"/><path d="M7 7l6 6M13 7l-6 6"/>
          </svg>
        </div>
        <div class="doc-action doc-action-done" aria-label="Uploaded">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="10" cy="10" r="8"/><path d="M6.5 10.5l2.5 2.5 5-5"/>
          </svg>
        </div>
      </div>
      <div class="doc-progress">
        <div class="progress-track">
          <div class="progress-fill" style="width:0%" id="fill3"></div>
        </div>
      </div>
    </div>

  </div><!-- /doc-list -->

  <!-- Cancel All Uploads -->
  <div style="position: absolute; left: 24px; right: 24px; bottom: 32px;">
    <button class="cancel-all-btn" style="width:100%;" onclick="window.location.href='ovie-upload-docs-uploading.html'">
      Cancel All Uploads
    </button>
  </div>

</div><!-- /phone-frame -->

<script>
  /* ── Animate progress bars on load ───────────────────────────────────── */
  const fills = [
    { el: document.getElementById('fill1'), target: 50,  duration: 1600 },
    { el: document.getElementById('fill2'), target: 25,  duration: 2400 },
    { el: document.getElementById('fill3'), target: 75,  duration: 1000 },
  ];

  function animateFill(fill) {
    const start = performance.now();
    function step(now) {
      const t = Math.min((now - start) / fill.duration, 1);
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; // ease-in-out
      fill.el.style.width = (ease * fill.target) + '%';
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  fills.forEach(f => animateFill(f));

  /* ── After 3.5s — transition docs 1 and 3 to done state ─────────────── */
  setTimeout(() => {
    // Doc 1 done
    document.getElementById('fill1').style.transition = 'width 0.5s ease';
    document.getElementById('fill1').style.width = '100%';
    setTimeout(() => document.getElementById('doc1').classList.add('done'), 500);

    // Doc 3 done
    document.getElementById('fill3').style.transition = 'width 0.3s ease';
    document.getElementById('fill3').style.width = '100%';
    setTimeout(() => document.getElementById('doc3').classList.add('done'), 300);

    // Update subtitle
    setTimeout(() => {
      document.getElementById('topBarSub').textContent = 'Uploading 1 doc';
    }, 600);
  }, 3500);
</script>

</body>
</html>
